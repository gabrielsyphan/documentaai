name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DocumentaAI ${tag}`,
              body: [
                '## Download',
                '',
                '| Plataforma | Arquivo |',
                '|---|---|',
                '| macOS Apple Silicon | `documentaai-macos.dmg` |',
                '| Windows | `documentaai-windows.exe` |',
                '| Linux | `documentaai-linux.AppImage` |',
              ].join('\n'),
              draft: false,
              prerelease: false,
            })
            return String(data.id)

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: documentaai-macos.dmg
            artifact_find: "*/bundle/dmg/*.dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: documentaai-windows.exe
            artifact_find: "*/bundle/nsis/*-setup.exe"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: documentaai-linux.AppImage
            artifact_find: "*/bundle/appimage/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxtst-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action com releaseId: faz o build, assina e sobe TODOS os artefatos
      # (instaladores versionados + bundles de update + .sig). Só ele conhece a lógica
      # de signing; sem releaseId, os bundles de update e .sig não são gerados.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      # Sobe uma cópia com nome fixo (sem versão) para facilitar download manual
      - name: Upload simple-named installer
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALLER=$(find src-tauri/target -path "${{ matrix.artifact_find }}" ! -name "*.sig" | head -1)
          echo "Installer: $INSTALLER"
          cp "$INSTALLER" "${{ matrix.artifact_name }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.artifact_name }}" --clobber

  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Descobre os nomes dos .sig que o tauri-action subiu (nomes versionados)
          SIG_MAC_NAME=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '[.assets[].name | select(endswith(".app.tar.gz.sig"))] | first // ""')
          SIG_WIN_NAME=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '[.assets[].name | select(endswith(".nsis.zip.sig"))] | first // ""')
          SIG_LIN_NAME=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '[.assets[].name | select(endswith(".AppImage.tar.gz.sig"))] | first // ""')

          echo "Mac sig: $SIG_MAC_NAME"
          echo "Win sig: $SIG_WIN_NAME"
          echo "Lin sig: $SIG_LIN_NAME"

          # Baixa o conteúdo dos .sig
          [ -n "$SIG_MAC_NAME" ] && \
            SIG_MAC=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_MAC_NAME" --output -) || \
            SIG_MAC=""
          [ -n "$SIG_WIN_NAME" ] && \
            SIG_WIN=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_WIN_NAME" --output -) || \
            SIG_WIN=""
          [ -n "$SIG_LIN_NAME" ] && \
            SIG_LIN=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_LIN_NAME" --output -) || \
            SIG_LIN=""

          # Exporta para o Python ler via os.environ
          export TAG="$TAG"
          export SIG_MAC="$SIG_MAC"
          export SIG_WIN="$SIG_WIN"
          export SIG_LIN="$SIG_LIN"
          export URL_MAC="${BASE}/${SIG_MAC_NAME%.sig}"
          export URL_WIN="${BASE}/${SIG_WIN_NAME%.sig}"
          export URL_LIN="${BASE}/${SIG_LIN_NAME%.sig}"

          python3 - <<'PYEOF'
import json, sys, os
from datetime import datetime, timezone

tag     = os.environ['TAG']
sig_mac = os.environ.get('SIG_MAC', '')
sig_win = os.environ.get('SIG_WIN', '')
sig_lin = os.environ.get('SIG_LIN', '')
url_mac = os.environ.get('URL_MAC', '')
url_win = os.environ.get('URL_WIN', '')
url_lin = os.environ.get('URL_LIN', '')

data = {
  "version": tag.lstrip('v'),
  "notes": f"DocumentaAI {tag}",
  "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
  "platforms": {},
}

for platform, sig, url in [
  ("darwin-aarch64", sig_mac, url_mac),
  ("windows-x86_64", sig_win, url_win),
  ("linux-x86_64",   sig_lin, url_lin),
]:
  if sig.strip() and url.strip():
    data["platforms"][platform] = {"signature": sig.strip(), "url": url}

if not data["platforms"]:
  print("ERROR: nenhuma plataforma com assinatura encontrada", file=sys.stderr)
  sys.exit(1)

print(json.dumps(data, indent=2))
with open("latest.json", "w") as f:
  json.dump(data, f, indent=2)
PYEOF

          gh release upload "$TAG" latest.json --clobber
          echo "latest.json publicado no release $TAG"
