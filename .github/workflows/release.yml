name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DocumentaAI ${tag}`,
              body: [
                '## Download',
                '',
                '| Plataforma | Arquivo |',
                '|---|---|',
                '| macOS Apple Silicon | `documentaai-macos.dmg` |',
                '| Windows | `documentaai-windows.exe` |',
                '| Linux | `documentaai-linux.AppImage` |',
              ].join('\n'),
              draft: false,
              prerelease: false,
            })
            return String(data.id)

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: documentaai-macos.dmg
            artifact_find: "*/bundle/dmg/*.dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: documentaai-windows.exe
            artifact_find: "*/bundle/nsis/*-setup.exe"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: documentaai-linux.AppImage
            artifact_find: "*/bundle/appimage/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxtst-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifact
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT=$(find src-tauri/target -path "${{ matrix.artifact_find }}" ! -name "*.sig" | head -1)
          echo "Artifact: $ARTIFACT"
          cp "$ARTIFACT" "${{ matrix.artifact_name }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.artifact_name }}" --clobber
