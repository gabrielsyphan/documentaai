name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocumentaAI ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | Plataforma | Arquivo |
            |---|---|
            | macOS Apple Silicon | `DocumentaAI_*_aarch64.dmg` |
            | macOS Intel | `DocumentaAI_*_x64.dmg` |
            | Windows | `DocumentaAI_*_x64-setup.exe` |
            | Linux | `DocumentaAI_*_amd64.AppImage` ou `.deb` |
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
