name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DocumentaAI ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | Plataforma | Arquivo |
            |---|---|
            | macOS Apple Silicon | `DocumentaAI_*_aarch64.dmg` |
            | Windows | `DocumentaAI_*_x64-setup.exe` |
            | Linux | `DocumentaAI_*_amd64.AppImage` |
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  update-manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Generate and deploy latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          REPO="gabrielsyphan/documentaai"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          echo "Fetching release assets for ${TAG}..."
          ASSETS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" \
            | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          for a in r.get('assets', []):
              print(a['name'])
          ")

          echo "Assets found:"
          echo "$ASSETS"

          # Busca pelo nome real do asset usando padrão — Tauri pode incluir ou não a versão no nome
          MACOS_TAR=$(echo "$ASSETS" | grep -E "aarch64\.app\.tar\.gz$" | grep -v "\.sig$" | head -1)
          WIN_ZIP=$(echo "$ASSETS"   | grep -E "x64-setup\.nsis\.zip$"   | grep -v "\.sig$" | head -1)
          LINUX_AI=$(echo "$ASSETS"  | grep -E "amd64\.AppImage\.tar\.gz$" | grep -v "\.sig$" | head -1)

          echo "Bundles identificados:"
          echo "  macOS:   ${MACOS_TAR:-NÃO ENCONTRADO}"
          echo "  Windows: ${WIN_ZIP:-NÃO ENCONTRADO}"
          echo "  Linux:   ${LINUX_AI:-NÃO ENCONTRADO}"

          get_sig() {
            local name="$1"
            if [ -z "$name" ]; then echo ""; return; fi
            local sig_name="${name}.sig"
            if echo "$ASSETS" | grep -qF "$sig_name"; then
              curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" "${BASE_URL}/${sig_name}"
            else
              echo ""
            fi
          }

          SIG_MACOS=$(get_sig "$MACOS_TAR")
          SIG_WIN=$(get_sig "$WIN_ZIP")
          SIG_LINUX=$(get_sig "$LINUX_AI")

          echo "Assinaturas encontradas:"
          echo "  macOS:   ${SIG_MACOS:+SIM}"
          echo "  Windows: ${SIG_WIN:+SIM}"
          echo "  Linux:   ${SIG_LINUX:+SIM}"

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - <<PYEOF
          import json, sys
          version = "${VERSION}"
          tag = "${TAG}"
          pub_date = "${PUB_DATE}"
          base = "${BASE_URL}"

          data = {
            "version": version,
            "notes": f"DocumentaAI {tag}",
            "pub_date": pub_date,
            "platforms": {}
          }

          sigs = {
            "darwin-aarch64": ("${SIG_MACOS}", "${MACOS_TAR}"),
            "windows-x86_64": ("${SIG_WIN}",   "${WIN_ZIP}"),
            "linux-x86_64":   ("${SIG_LINUX}", "${LINUX_AI}"),
          }

          for platform, (sig, asset) in sigs.items():
            if sig.strip() and asset.strip():
              data["platforms"][platform] = {
                "signature": sig.strip(),
                "url": f"{base}/{asset}"
              }

          if not data["platforms"]:
            print("ERRO: nenhuma plataforma com assinatura encontrada.", file=sys.stderr)
            print("Verifique se TAURI_SIGNING_PRIVATE_KEY e TAURI_SIGNING_PRIVATE_KEY_PASSWORD estão configurados nos secrets do repositório.", file=sys.stderr)
            sys.exit(1)

          print(json.dumps(data, indent=2))
          with open("latest.json", "w") as f:
            json.dump(data, f, indent=2)
          PYEOF

          echo "Generated latest.json:"
          cat latest.json

          echo "Deploying to VPS via SSH key..."
          install -m 600 /dev/null /tmp/vps_key
          echo "$VPS_SSH_KEY" > /tmp/vps_key

          ssh -i /tmp/vps_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@2.25.203.118 \
            "mkdir -p /var/www/documentai/updates"

          scp -i /tmp/vps_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            latest.json \
            root@2.25.203.118:/var/www/documentai/updates/latest.json

          rm -f /tmp/vps_key
          echo "Done — latest.json deployed."
