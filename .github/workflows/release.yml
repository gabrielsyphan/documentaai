name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DocumentaAI ${tag}`,
              body: [
                '## Download',
                '',
                '| Plataforma | Arquivo |',
                '|---|---|',
                '| macOS Apple Silicon | `documentaai-macos.dmg` |',
                '| Windows | `documentaai-windows.exe` |',
                '| Linux | `documentaai-linux.AppImage` |',
              ].join('\n'),
              draft: false,
              prerelease: false,
            })
            return String(data.id)

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: documentaai-macos.dmg
            artifact_find: "*/bundle/dmg/*.dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: documentaai-windows.exe
            artifact_find: "*/bundle/nsis/*-setup.exe"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: documentaai-linux.AppImage
            artifact_find: "*/bundle/appimage/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxtst-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

      - name: Upload simple-named installer
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALLER=$(find src-tauri/target -path "${{ matrix.artifact_find }}" ! -name "*.sig" | head -1)
          echo "Installer: $INSTALLER"
          cp "$INSTALLER" "${{ matrix.artifact_name }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.artifact_name }}" --clobber

  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Busca todos os assets de uma vez e filtra com jq separado (gh --jq pode retornar "null" literal)
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets)

          echo "=== Assets no release ==="
          echo "$ASSETS" | jq -r '.assets[].name'
          echo "========================="

          SIG_MAC_NAME=$(echo "$ASSETS" | jq -r '[.assets[].name | select(endswith(".app.tar.gz.sig"))] | .[0] // ""')
          SIG_WIN_NAME=$(echo "$ASSETS" | jq -r '[.assets[].name | select(endswith(".nsis.zip.sig"))] | .[0] // ""')
          SIG_LIN_NAME=$(echo "$ASSETS" | jq -r '[.assets[].name | select(endswith(".AppImage.tar.gz.sig"))] | .[0] // ""')

          echo "Mac sig: $SIG_MAC_NAME"
          echo "Win sig: $SIG_WIN_NAME"
          echo "Lin sig: $SIG_LIN_NAME"

          [ -n "$SIG_MAC_NAME" ] && \
            SIG_MAC=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_MAC_NAME" --output -) || \
            SIG_MAC=""
          [ -n "$SIG_WIN_NAME" ] && \
            SIG_WIN=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_WIN_NAME" --output -) || \
            SIG_WIN=""
          [ -n "$SIG_LIN_NAME" ] && \
            SIG_LIN=$(gh release download "$TAG" --repo "$REPO" -p "$SIG_LIN_NAME" --output -) || \
            SIG_LIN=""

          URL_MAC="${BASE}/${SIG_MAC_NAME%.sig}"
          URL_WIN="${BASE}/${SIG_WIN_NAME%.sig}"
          URL_LIN="${BASE}/${SIG_LIN_NAME%.sig}"

          jq -n \
            --arg version "${TAG#v}" \
            --arg notes "DocumentaAI $TAG" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig_mac "$SIG_MAC" \
            --arg url_mac "$URL_MAC" \
            --arg sig_win "$SIG_WIN" \
            --arg url_win "$URL_WIN" \
            --arg sig_lin "$SIG_LIN" \
            --arg url_lin "$URL_LIN" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                | if $sig_mac != "" and $url_mac != "" then . + {"darwin-aarch64": {signature: $sig_mac, url: $url_mac}} else . end
                | if $sig_win != "" and $url_win != "" then . + {"windows-x86_64": {signature: $sig_win, url: $url_win}} else . end
                | if $sig_lin != "" and $url_lin != "" then . + {"linux-x86_64": {signature: $sig_lin, url: $url_lin}} else . end
              )
            }' > latest.json

          cat latest.json

          PLATFORMS=$(jq '.platforms | length' latest.json)
          if [ "$PLATFORMS" -eq 0 ]; then
            echo "ERROR: nenhuma plataforma com assinatura encontrada"
            exit 1
          fi

          gh release upload "$TAG" latest.json --clobber
          echo "latest.json publicado no release $TAG"
